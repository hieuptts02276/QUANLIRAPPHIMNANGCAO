<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Foods</title><link rel="stylesheet" href="/public/style.css"></head><body><script src="/public/common.js"></script><script>
(async()=>{await renderLayout('Food & Combo',`<section class='card glass'><h1>Food & Combo</h1><div class='two-col'><form id='ff' class='grid-form'><h3>Thêm Food</h3><label>Tên<input name='FoodName' required></label><label>Giá<input type='number' name='Price' required></label><label>Loại<input name='Type'></label><button>Thêm Food</button></form><form id='cf' class='grid-form'><h3>Thêm Combo</h3><label>Tên<input name='ComboName' required></label><label>Giá<input type='number' name='Price' required></label><button>Thêm Combo</button></form></div><div class='two-col'><div><h3>Foods</h3><ul id='foods'></ul></div><div><h3>Combos</h3><ul id='combos'></ul></div></div></section>`,['admin','staff']);
async function load(){const d=await fetch('/api/foods').then(r=>r.json()); foods.innerHTML=d.foods.map(f=>`<li>${f.FoodName} - ${currency(f.Price)} đ</li>`).join(''); combos.innerHTML=d.combos.map(c=>`<li>${c.ComboName} - ${currency(c.Price)} đ</li>`).join(''); bindFluentEffects();}
ff.onsubmit=async(e)=>{e.preventDefault(); await fetch('/api/foods',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(e.target)))}); e.target.reset(); load();};
cf.onsubmit=async(e)=>{e.preventDefault(); await fetch('/api/combos',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(e.target)))}); e.target.reset(); load();};
load();})();
</script></body></html>
