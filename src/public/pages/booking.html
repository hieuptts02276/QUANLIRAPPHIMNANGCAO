<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Booking</title><link rel="stylesheet" href="/public/style.css"></head><body><script src="/public/common.js"></script><script>
(async()=>{await renderLayout('Đặt vé',`<section class='card glass'><h1>Đặt vé xem phim</h1><label>Suất chiếu<select id='showtime'></select></label><form id='f' class='grid-form'><input type='hidden' name='showtimeId' id='showtimeId'><label>Chọn ghế<div class='seat-grid' id='seats'></div></label><div class='two-col'><label>Food<select name='foodId' id='food'><option value=''>Không</option></select></label><label>SL food<input type='number' min='0' name='foodQty' value='0'></label><label>Combo<select name='comboId' id='combo'><option value=''>Không</option></select></label><label>SL combo<input type='number' min='0' name='comboQty' value='0'></label></div><label>Thanh toán<select name='paymentMethod'><option value='cash'>Tiền mặt</option><option value='banking'>Chuyển khoản</option><option value='card'>Thẻ</option></select></label><button>Xác nhận đặt vé</button></form><div id='msg' class='ok' style='display:none'></div></section>`,['customer']);
async function load(showID=''){const d=await fetch('/api/booking-data'+(showID?`?showtime=${showID}`:'')).then(r=>r.json()); showtime.innerHTML=d.showtimes.map(s=>`<option value='${s.ShowtimeID}' ${s.ShowtimeID===d.selectedShowtimeId?'selected':''}>${s.Title} | ${s.RoomName} | ${s.StartTime} | ${currency(s.Price)} đ</option>`).join(''); showtimeId.value=d.selectedShowtimeId||''; seats.innerHTML=d.seats.map(s=>`<label class='seat ${s.Status}'><input type='checkbox' name='seatIds' value='${s.ShowtimeSeatID}' ${s.Status!=='available'?'disabled':''}><span>${s.SeatNumber}</span></label>`).join(''); food.innerHTML=`<option value=''>Không</option>`+d.foods.map(f=>`<option value='${f.FoodID}'>${f.FoodName} - ${currency(f.Price)} đ</option>`).join(''); combo.innerHTML=`<option value=''>Không</option>`+d.combos.map(c=>`<option value='${c.ComboID}'>${c.ComboName} - ${currency(c.Price)} đ</option>`).join(''); bindFluentEffects();}
showtime.onchange=()=>load(showtime.value);
f.onsubmit=async(e)=>{e.preventDefault(); const payload=Object.fromEntries(new FormData(e.target)); payload.seatIds=[...document.querySelectorAll('input[name="seatIds"]:checked')].map(x=>x.value); const rs=await fetch('/api/book',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); const d=await rs.json(); if(rs.ok){msg.style.display='block'; msg.textContent='Đặt vé thành công, mã #'+d.bookingId; load(showtime.value);} else {alert(d.error||'Lỗi đặt vé');}};
load();})();
</script></body></html>
