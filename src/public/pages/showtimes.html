<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Showtimes</title><link rel="stylesheet" href="/public/style.css"></head><body><script src="/public/common.js"></script><script>
(async()=>{await renderLayout('Showtimes',`<section class='card glass'><h1>Suất chiếu</h1><form id='f' class='grid-form cols-4'><label>Phim<select name='MovieID' id='movie'></select></label><label>Phòng<select name='RoomID' id='room'></select></label><label>Bắt đầu<input type='datetime-local' name='StartTime' required></label><label>Kết thúc<input type='datetime-local' name='EndTime' required></label><label>Giá vé<input type='number' name='Price' required></label><button>Thêm suất</button></form><table><thead><tr><th>ID</th><th>Phim</th><th>Phòng</th><th>Bắt đầu</th><th>Giá</th></tr></thead><tbody id='tb'></tbody></table></section>`,['admin','staff']);
async function load(){const d=await fetch('/api/showtimes').then(r=>r.json()); movie.innerHTML=d.movies.map(m=>`<option value='${m.MovieID}'>${m.Title}</option>`).join(''); room.innerHTML=d.rooms.map(r=>`<option value='${r.RoomID}'>${r.RoomName}</option>`).join(''); tb.innerHTML=d.showtimes.map(s=>`<tr><td>${s.ShowtimeID}</td><td>${s.Title}</td><td>${s.RoomName}</td><td>${s.StartTime}</td><td>${currency(s.Price)} đ</td></tr>`).join(''); bindFluentEffects();}
document.getElementById('f').onsubmit=async(e)=>{e.preventDefault(); await fetch('/api/showtimes',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(e.target)))}); e.target.reset(); load();}; load();})();
</script></body></html>
