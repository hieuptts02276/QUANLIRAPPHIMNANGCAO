<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Promotions</title><link rel="stylesheet" href="/public/style.css"></head><body><script src="/public/common.js"></script><script>
(async()=>{await renderLayout('Promotions',`<section class='card glass'><h1>Khuyến mãi</h1><form id='f' class='grid-form cols-4'><label>Tên<input name='Name' required></label><label>Giảm %<input type='number' name='DiscountPercent' required></label><label>Bắt đầu<input type='date' name='StartDate' required></label><label>Kết thúc<input type='date' name='EndDate' required></label><label>Trạng thái<select name='Status'><option>active</option><option>inactive</option></select></label><button>Thêm KM</button></form><table><thead><tr><th>Tên</th><th>%</th><th>Thời gian</th><th>Status</th></tr></thead><tbody id='tb'></tbody></table></section>`,['admin']);
async function load(){const rows=await fetch('/api/promotions').then(r=>r.json()); tb.innerHTML=rows.map(p=>`<tr><td>${p.Name}</td><td>${p.DiscountPercent}%</td><td>${p.StartDate} → ${p.EndDate}</td><td>${p.Status}</td></tr>`).join(''); bindFluentEffects();}
f.onsubmit=async(e)=>{e.preventDefault(); await fetch('/api/promotions',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(e.target)))}); e.target.reset(); load();}; load();})();
</script></body></html>
