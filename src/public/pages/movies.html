<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Movies</title><link rel="stylesheet" href="/public/style.css"></head><body><script src="/public/common.js"></script><script>
(async()=>{await renderLayout('Movies',`<section class='card glass'><h1>Phim</h1><form id='f' class='grid-form cols-4'><label>Tên phim<input name='Title' required></label><label>Thời lượng<input type='number' name='Duration' required></label><label>Ngày chiếu<input type='date' name='ReleaseDate' required></label><label>Ngôn ngữ<input name='Language'></label><label>Độ tuổi<input name='AgeRating'></label><label>Trạng thái<select name='Status'><option>active</option><option>inactive</option></select></label><label class='span-4'>Mô tả<textarea name='Description'></textarea></label><button>Thêm phim</button></form><table><thead><tr><th>ID</th><th>Tên</th><th>Thời lượng</th><th>Ngày</th><th>Status</th></tr></thead><tbody id='tb'></tbody></table></section>`,['admin','staff']);
async function load(){const rows=await fetch('/api/movies').then(r=>r.json()); document.getElementById('tb').innerHTML=rows.map(m=>`<tr><td>${m.MovieID}</td><td>${m.Title}</td><td>${m.Duration}</td><td>${m.ReleaseDate||''}</td><td>${m.Status}</td></tr>`).join(''); bindFluentEffects();}
document.getElementById('f').onsubmit=async(e)=>{e.preventDefault(); await fetch('/api/movies',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(e.target)))}); e.target.reset(); load();}; load();})();
</script></body></html>
