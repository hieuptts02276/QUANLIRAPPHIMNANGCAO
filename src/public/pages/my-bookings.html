<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>My Bookings</title><link rel="stylesheet" href="/public/style.css"></head><body><script src="/public/common.js"></script><script>
(async()=>{await renderLayout('Vé của tôi',`<section class='card glass'><h1>Đơn đặt vé của tôi</h1><table><thead><tr><th>ID</th><th>Phim</th><th>Suất chiếu</th><th>Tổng tiền</th><th>Trạng thái</th></tr></thead><tbody id='tb'></tbody></table></section>`,['customer']); const rows=await fetch('/api/my-bookings').then(r=>r.json()); tb.innerHTML=rows.map(b=>`<tr><td>${b.BookingID}</td><td>${b.Title}</td><td>${b.StartTime}</td><td>${currency(b.TotalAmount)} đ</td><td>${b.Status}</td></tr>`).join(''); bindFluentEffects();})();
</script></body></html>
