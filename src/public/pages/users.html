<!doctype html><html lang="vi"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Users</title><link rel="stylesheet" href="/public/style.css"></head><body><script src="/public/common.js"></script><script>
(async()=>{await renderLayout('Users',`<section class='card glass'><h1>Người dùng</h1><form id='f' class='grid-form cols-4'><label>Họ tên<input name='Fullname' required></label><label>Email<input type='email' name='Email' required></label><label>Mật khẩu<input type='password' name='Password' required></label><label>Vai trò<select name='Role'><option>admin</option><option>staff</option><option selected>customer</option></select></label><button>Tạo user</button></form><table><thead><tr><th>ID</th><th>Name</th><th>Email</th><th>Role</th><th>Active</th></tr></thead><tbody id='tb'></tbody></table></section>`,['admin']);
async function load(){const rows=await fetch('/api/users').then(r=>r.json()); tb.innerHTML=rows.map(u=>`<tr><td>${u.UserID}</td><td>${u.Fullname}</td><td>${u.Email}</td><td>${u.Role}</td><td>${u.Active}</td></tr>`).join(''); bindFluentEffects();}
f.onsubmit=async(e)=>{e.preventDefault(); await fetch('/api/users',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(Object.fromEntries(new FormData(e.target)))}); e.target.reset(); load();}; load();})();
</script></body></html>
